<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Number Display</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 50px;
        }
        .hidden {
            display: none;
        }
        .number {
            font-size: 50px;
        }
        .smaller {
            font-size: 30px;
        }
    </style>
</head>
<body>

    <!-- Start Screen -->
    <div id="start-screen">
        <h1>This is a description</h1>
        <button id="start-button">Start</button>
    </div>

    <!-- Countdown Screen -->
    <div id="countdown-screen" class="hidden">
        <h1>Starting in <span id="countdown">3</span>...</h1>
    </div>

    <!-- Number Screen -->
    <div id="number-screen" class="hidden">
        <h1 id="number-display"></h1>
        <button id="next-button">Next</button>
    </div>

    <!-- Final Screen -->
    <div id="final-screen" class="hidden">
        <h1 id="final-message"></h1>
        <button id="restart-button">Go Back to Start</button>
    </div>

    <script>
        let currentRound = 0;
        let startTime;
        const totalRounds = 20;

        document.getElementById("start-button").onclick = function() {
            startGame();
        };

        document.getElementById("next-button").onclick = function() {
            showNextNumbers();
        };

        document.getElementById("restart-button").onclick = function() {
            resetGame();
        };

        function startGame() {
            document.getElementById("start-screen").classList.add("hidden");
            document.getElementById("countdown-screen").classList.remove("hidden");
            startCountdown();
        }

        function startCountdown() {
            let countdown = 3;
            const countdownElement = document.getElementById("countdown");

            const countdownInterval = setInterval(function() {
                countdownElement.textContent = countdown;
                countdown--;

                if (countdown < 0) {
                    clearInterval(countdownInterval);
                    startTimer();
                }
            }, 1000);
        }

        function startTimer() {
            startTime = Date.now();
            currentRound = 0;
            showNextNumbers();
        }

        function showNextNumbers() {
            if (currentRound < totalRounds) {
                const a = Math.floor(Math.random() * 9) + 1;
                const b = Math.floor(Math.random() * 9) + 1;

                // Ensure a is greater than b
                const [larger, smaller] = a > b ? [a, b] : [b, a];

                // Randomly decide the display order
                const displayOrder = Math.random() < 0.5;

                const numberDisplay = document.getElementById("number-display");
                numberDisplay.innerHTML = displayOrder 
                    ? `<span class="number">${larger}</span> <span class="smaller">${smaller}</span>` 
                    : `<span class="smaller">${smaller}</span> <span class="number">${larger}</span>`;

                document.getElementById("number-screen").classList.remove("hidden");
                document.getElementById("countdown-screen").classList.add("hidden");

                currentRound++;
            } else {
                endGame();
            }
        }

        function endGame() {
            const elapsedTime = ((Date.now() - startTime) / 1000).toFixed(2);
            document.getElementById("final-message").textContent = `It took you ${elapsedTime} seconds to finish`;
            document.getElementById("number-screen").classList.add("hidden");
            document.getElementById("final-screen").classList.remove("hidden");
        }

        function resetGame() {
            document.getElementById("final-screen").classList.add("hidden");
            document.getElementById("start-screen").classList.remove("hidden");
        }
    </script>
</body>
</html>
